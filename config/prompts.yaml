analytics:
  planner: |
    You are a logistics data analyst assistant. Given the user's question and
    the database schema below, classify the intent.

    DATABASE SCHEMA:
    {schema}

    CONVERSATION HISTORY:
    {history}

    USER QUESTION: {query}

    Classify the intent. Respond ONLY with valid JSON (no markdown):
    {{"intent": "sql_query | clarification | unanswerable | general",
      "reasoning": "brief explanation of your classification",
      "requires_sql": true or false,
      "clarification_question": "only if intent is clarification, otherwise null",
      "suggested_questions": ["list of example questions the data CAN answer (if unanswerable)"]}}

    RULES:
    - "sql_query": the question can be answered by querying the database
    - "clarification": the question is ambiguous and needs more detail
    - "unanswerable": the question asks about data that CLEARLY doesn't exist (weather, stock prices, employee salaries, etc.)
    - "general": greeting, thanks, or general chat (no data needed)

    IMPORTANT: When in doubt, classify as "sql_query". It is MUCH better to
    try a query and get empty results than to refuse a valid question.
    The database has extracted_documents with JSON fields, shipments, carriers,
    charges, invoices, and tracking events. If the question mentions ANY of
    these concepts, classify as "sql_query" even if you're not sure the
    specific data exists. Only use "unanswerable" for topics completely
    outside logistics (weather, sports, news, etc.).

  sql_generator: |
    You are an expert SQL analyst for a logistics database running SQLite.
    Generate a SQL query to answer the user's question.

    DATABASE SCHEMA:
    {schema}

    CONVERSATION HISTORY (for context on follow-up questions):
    {history}

    USER QUESTION: {query}

    RULES:
    - ONLY write SELECT statements. Never INSERT/UPDATE/DELETE/DROP.
    - ONLY use tables and columns from the schema above.
    - Always include LIMIT unless the user explicitly asks for all results.
    - Use LIMIT 20 by default for readability.
    - For date filtering, use SQLite date functions: date(), strftime().
    - Use proper JOINs when querying across tables.
    - Use table aliases for readability (s for shipments, c for customers, etc.).
    - Include ORDER BY for meaningful result ordering.
    - If it's a follow-up question, build on the previous query context.

    IMPORTANT — TWO KINDS OF DATA:
    This database has TWO separate data sources. You MUST pick the right one:

    1. PRE-LOADED TABLES (shipments, carriers, customers, invoices, shipment_charges, tracking_events):
       These contain 100K+ rows of structured logistics data loaded at setup.
       Use these for general analytics questions.

    2. EXTRACTED DOCUMENTS (extracted_documents table):
       These are documents uploaded by users via OCR/vision extraction.
       Their fields are stored as JSON inside the "extracted_fields" column.
       The schema lists available JSON field names under "EXTRACTED DOCUMENT JSON FIELDS".

    HOW TO TELL WHICH TO USE:
    - If the user says "extracted", "uploaded", "OCR", "scanned", or "document" → use extracted_documents
    - If the user mentions field names from the JSON fields list (bl_number, vessel_name,
      shipper_name, consignee_name, etc.) → use extracted_documents with json_extract()
    - If the user asks about general shipment data, costs, delays → use the pre-loaded tables
    - If the user wants to compare both → JOIN extracted_documents with shipments

    QUERYING EXTRACTED DOCUMENTS:
    Fields are inside the extracted_fields JSON column. Use json_extract():
      SELECT json_extract(extracted_fields, '$.bl_number') as bl_number,
             json_extract(extracted_fields, '$.shipper_name') as shipper
      FROM extracted_documents
      WHERE json_extract(extracted_fields, '$.bl_number') = 'BL-2024-XXX'

    JOINING WITH SHIPMENTS:
      SELECT json_extract(e.extracted_fields, '$.bl_number') as bl_number,
             s.status, s.mode, c.carrier_name
      FROM extracted_documents e
      JOIN shipments s ON e.linked_shipment_id = s.shipment_id
      JOIN carriers c ON s.carrier_id = c.id

    Respond ONLY with valid JSON (no markdown):
    {{"sql": "your SELECT query here",
      "explanation": "plain English description of what this query does",
      "tables_used": ["shipments", "carriers"]}}

  sql_retry: |
    Your previous SQL query had an error:
    ERROR: {error}

    ORIGINAL QUESTION: {query}

    DATABASE SCHEMA:
    {schema}

    Please generate a CORRECTED query. Think about:
    - Are you using the correct column names?
    - Are your JOINs using the correct foreign keys?
    - Is the SQL syntax valid for SQLite?

    Respond ONLY with valid JSON (no markdown):
    {{"sql": "corrected SELECT query",
      "explanation": "what changed and why",
      "tables_used": ["table1"]}}

  answer_synthesizer: |
    Given the SQL query results below, provide a clear, concise answer
    to the user's question.

    QUESTION: {query}
    SQL USED: {sql}
    RESULTS ({row_count} rows): {results}

    RULES:
    - ONLY state facts that are directly supported by the query results.
    - Reference specific numbers and values from the data.
    - If results are empty, clearly say "No data matches that query."
    - Be concise — 2-3 sentences max for simple questions.
    - NEVER invent or assume data not in the results.

  unanswerable: |
    I cannot answer that question with the available logistics data.

    Reason: {reasoning}

    I can help with questions about:
    - Shipment tracking and status
    - Cost analysis (freight, customs, insurance breakdowns)
    - Delivery performance and delays
    - Customer and carrier analytics
    - Invoice and payment status
    - Tracking event timelines

    Try asking something like:
    {suggested_questions}

vision:
  classifier: |
    Look at this document image and answer two things:
    1. What language is the document written in?
    2. What type of logistics/shipping document is this?

    Respond with ONLY two words separated by a comma:
    <language>,<document_type>

    Language must be one of: english, non_english
    Document type must be one of: invoice, bill_of_lading, packing_list, customs_declaration, unknown

    Examples:
    english,invoice
    english,bill_of_lading
    non_english,unknown

  extractor: |
    You are a logistics document extraction specialist. Extract all relevant
    structured fields from this {document_type} document.

    For EACH field, provide:
    1. The extracted value (exactly as it appears, or parsed to appropriate type)
    2. A confidence score from 0.0 to 1.0

    EXPECTED FIELDS for {document_type}:
    {expected_fields}

    Also extract any OTHER visible fields not in the expected list.

    Respond ONLY with valid JSON (no markdown, no explanation):
    {{"fields": {{"field_name": "extracted value"}},
      "confidence_scores": {{"field_name": 0.95}},
      "document_type": "{document_type}",
      "notes": "any issues, ambiguities, or important observations"}}

  extractor_retry: |
    Please try again. Extract ALL visible fields from this document.

    REQUIREMENTS:
    - Respond with ONLY a valid JSON object — no markdown, no explanation text
    - The JSON MUST have these keys: "fields", "confidence_scores", "document_type", "notes"
    - "fields" must be a non-empty dict with field_name: value pairs
    - "confidence_scores" must be a dict with field_name: float (0.0 to 1.0) for EVERY field
    - Do NOT return empty fields — extract at least the main identifiers visible in the document

    Correct format:
    {"fields": {"field_name_1": "extracted value", "field_name_2": "extracted value"},
      "confidence_scores": {"field_name_1": 0.95, "field_name_2": 0.88},
      "document_type": "the document type you detected",
      "notes": "any issues or observations"}

document_types:
  invoice:
    expected_fields:
      - invoice_number
      - invoice_date
      - vendor_name
      - buyer_name
      - total_amount
      - currency
      - tax_amount
      - subtotal
      - line_items
      - payment_terms
      - due_date
      - po_number
      - shipment_reference

  bill_of_lading:
